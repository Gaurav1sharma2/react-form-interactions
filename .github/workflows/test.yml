name: Accessibility and Form Validation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Comprehensive Element Testing
      run: |
        echo "=========================================="
        echo "COMPREHENSIVE ELEMENT TESTING"
        echo "=========================================="
        echo ""
        
        echo "1️⃣  INPUT ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for <input> elements..."
        grep -r '<input' src/pages/ && echo "  ✓ Input elements found" || echo "  ✗ No input elements found"
        echo ""
        
        echo "✓ Checking for input type attributes..."
        grep -r 'type="text"' src/pages/ && echo "  ✓ Text input type found" || echo "  ⚠ No text input type"
        grep -r 'type="email"' src/pages/ && echo "  ✓ Email input type found" || echo "  ⚠ No email input type"
        grep -r 'type="password"' src/pages/ && echo "  ✓ Password input type found" || echo "  ⚠ No password input type"
        echo ""
        
        echo "✓ Checking for input id attributes..."
        grep -r 'id="blank' src/pages/ && echo "  ✓ Fill-in-the-blank input ids found" || echo "  ✗ Missing blank input ids"
        grep -r 'id="email"' src/pages/ && echo "  ✓ Email input id found" || echo "  ✗ Missing email input id"
        grep -r 'id="password"' src/pages/ && echo "  ✓ Password input id found" || echo "  ✗ Missing password input id"
        grep -r 'id="dropdown"' src/pages/ && echo "  ✓ Dropdown input id found" || echo "  ✗ Missing dropdown input id"
        echo ""
        
        echo "✓ Checking for aria-required on inputs..."
        grep -r 'aria-required="true"' src/pages/ && echo "  ✓ aria-required found on inputs" || echo "  ✗ Missing aria-required"
        echo ""
        
        echo "✓ Checking for aria-invalid on inputs..."
        grep -r 'aria-invalid=' src/pages/ && echo "  ✓ aria-invalid found on inputs" || echo "  ✗ Missing aria-invalid"
        echo ""
        
        echo "✓ Checking for aria-describedby on inputs..."
        grep -r 'aria-describedby=' src/pages/ && echo "  ✓ aria-describedby found on inputs" || echo "  ✗ Missing aria-describedby"
        echo ""
        
        echo "✓ Checking for placeholder attributes..."
        grep -r 'placeholder=' src/pages/ && echo "  ✓ Placeholder text found" || echo "  ⚠ No placeholder text"
        echo ""
        
        echo "2️⃣  LABEL ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for <label> elements..."
        grep -r '<label' src/pages/ && echo "  ✓ Label elements found" || echo "  ✗ No label elements found"
        echo ""
        
        echo "✓ Checking for htmlFor attribute on labels..."
        grep -r 'htmlFor=' src/pages/ && echo "  ✓ htmlFor attribute found" || echo "  ✗ Missing htmlFor attribute"
        echo ""
        
        echo "3️⃣  BUTTON ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for <button> elements..."
        grep -r '<button' src/pages/ && echo "  ✓ Button elements found" || echo "  ✗ No button elements found"
        echo ""
        
        echo "✓ Checking for button type attributes..."
        grep -r 'type="submit"' src/pages/ && echo "  ✓ Submit button found" || echo "  ⚠ No submit button"
        echo ""
        
        echo "✓ Checking for aria-label on buttons..."
        grep -r 'aria-label=' src/pages/ | grep -i button && echo "  ✓ aria-label on buttons found" || echo "  ⚠ Check button labels"
        echo ""
        
        echo "4️⃣  FORM ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for <form> elements..."
        grep -r '<form' src/pages/ && echo "  ✓ Form elements found" || echo "  ✗ No form elements found"
        echo ""
        
        echo "✓ Checking for form aria-label..."
        grep -r '<form.*aria-label' src/pages/ && echo "  ✓ Form aria-label found" || echo "  ✗ Missing form aria-label"
        echo ""
        
        echo "✓ Checking for noValidate attribute..."
        grep -r 'noValidate' src/pages/ && echo "  ✓ noValidate attribute found" || echo "  ⚠ No noValidate attribute"
        echo ""
        
        echo "5️⃣  SELECT/DROPDOWN ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for <select> elements..."
        grep -r '<select' src/pages/ && echo "  ✓ Select elements found" || echo "  ✗ No select elements found"
        echo ""
        
        echo "✓ Checking for <option> elements..."
        grep -r '<option' src/pages/ && echo "  ✓ Option elements found" || echo "  ✗ No option elements found"
        echo ""
        
        echo "6️⃣  ERROR MESSAGE ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for error message spans..."
        grep -r 'role="alert"' src/pages/ && echo "  ✓ Alert role on error messages found" || echo "  ✗ Missing alert role"
        echo ""
        
        echo "✓ Checking for error message class..."
        grep -r 'className="error-message"' src/pages/ && echo "  ✓ Error message class found" || echo "  ✗ Missing error message class"
        echo ""
        
        echo "7️⃣  SEMANTIC HTML TESTING"
        echo "---"
        echo "✓ Checking for heading elements..."
        grep -r '<h[1-6]' src/pages/ && echo "  ✓ Heading elements found" || echo "  ✗ No heading elements found"
        echo ""
        
        echo "✓ Checking for role attributes..."
        grep -r 'role=' src/pages/ && echo "  ✓ Role attributes found" || echo "  ⚠ No role attributes"
        echo ""
        
        echo "✓ Checking for region roles..."
        grep -r 'role="region"' src/pages/ && echo "  ✓ Region roles found" || echo "  ✗ Missing region roles"
        echo ""
        
        echo "✓ Checking for status roles..."
        grep -r 'role="status"' src/pages/ && echo "  ✓ Status role found" || echo "  ✗ Missing status role"
        echo ""
        
        echo "8️⃣  ARIA-LIVE REGIONS TESTING"
        echo "---"
        echo "✓ Checking for aria-live attributes..."
        grep -r 'aria-live=' src/pages/ && echo "  ✓ aria-live attribute found" || echo "  ✗ Missing aria-live attribute"
        echo ""
        
        echo "9️⃣  SUCCESS MESSAGE ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for success message elements..."
        grep -r 'className="success-message"' src/pages/ && echo "  ✓ Success message element found" || echo "  ✗ Missing success message"
        echo ""
        
        echo "✓ Checking for success message role..."
        grep -r 'role="status"' src/pages/ && echo "  ✓ Success message has status role" || echo "  ✗ Missing status role"
        echo ""
        
        echo "🔟  ANSWERS DISPLAY ELEMENTS TESTING"
        echo "---"
        echo "✓ Checking for answers display section..."
        grep -r 'className="answers-display"' src/pages/ && echo "  ✓ Answers display section found" || echo "  ✗ Missing answers display"
        echo ""
        
        echo "✓ Checking for answers region role..."
        grep -r 'role="region"' src/pages/ && echo "  ✓ Answers region role found" || echo "  ✗ Missing region role"
        echo ""
        
        echo "=========================================="
        echo "✅ Element testing completed!"
        echo "=========================================="
    
    - name: Build Application
      run: |
        echo "=========================================="
        echo "BUILDING APPLICATION"
        echo "=========================================="
        npm run build
    
    - name: Upload Test Coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: unit-tests
        name: test-coverage
        fail_ci_if_error: false
      continue-on-error: true


