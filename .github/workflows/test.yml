name: Complete Testing Pipeline - Jest | GitHub Actions | Playwright

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    # ============================================
    # MODE 1: JEST UNIT TESTS (5 Key Tests)
    # ============================================
    # Tests component logic in isolation
    # Simulates user interactions with mocked data
    - name: Run Jest Unit Tests
      run: npm test -- --watchAll=false --testNamePattern="TEST [1-5]:"
      env:
        CI: true
        SUPPRESS_NO_CONFIG_WARNING: true
      continue-on-error: true
    
    # ============================================
    # MODE 2: GITHUB ACTIONS ELEMENT TESTS (5 Checks)
    # ============================================
    # Tests static code structure
    # Verifies element presence and attributes
    - name: GitHub Actions Element Testing (5 Checks)
      run: |
        echo "=========================================="
        echo "MODE 2: GITHUB ACTIONS ELEMENT TESTS (5 Checks)"
        echo "=========================================="
        echo ""
        
        echo "CHECK 1️⃣  Input Elements Exist"
        grep -r '<input' src/pages/ && echo "  ✓ Input elements found" || echo "  ✗ No input elements found"
        echo ""
        
        echo "CHECK 2️⃣  Dropdown Elements Exist"
        grep -r '<select' src/pages/ && echo "  ✓ Select elements found" || echo "  ✗ No select elements found"
        echo ""
        
        echo "CHECK 3️⃣  ARIA Attributes Present"
        grep -r 'aria-required="true"' src/pages/ && echo "  ✓ aria-required found" || echo "  ✗ Missing aria-required"
        echo ""
        
        echo "CHECK 4️⃣  Form Elements Exist"
        grep -r '<form' src/pages/ && echo "  ✓ Form elements found" || echo "  ✗ No form elements found"
        echo ""
        
        echo "CHECK 5️⃣  Error Messages Have Alert Role"
        grep -r 'role="alert"' src/pages/ && echo "  ✓ Alert role found" || echo "  ✗ Missing alert role"
        echo ""
        
        echo "=========================================="
        echo "✅ GitHub Actions element testing completed!"
        echo "=========================================="
    
    # ============================================
    # MODE 3: PLAYWRIGHT E2E TESTS (5 Tests)
    # ============================================
    # Tests real browser interactions
    # Chrome (Chromium) engine only for speed
    - name: Install Playwright
      run: npm install -D @playwright/test
      continue-on-error: true
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium firefox webkit
      continue-on-error: true
    
    - name: Start Application Server
      run: |
        echo "Starting app on port 3001..."
        PORT=3001 npm start > /tmp/app.log 2>&1 &
        APP_PID=$!
        echo "App PID: $APP_PID"
        
        # Wait up to 120 seconds for app to start
        for i in {1..120}; do
          if curl -s http://localhost:3001 > /dev/null 2>&1; then
            echo "✅ App started successfully on port 3001"
            sleep 5
            exit 0
          fi
          if [ $((i % 10)) -eq 0 ]; then
            echo "Still waiting... ($i/120)"
            tail -20 /tmp/app.log
          fi
          sleep 1
        done
        
        echo "❌ App failed to start after 120 seconds"
        echo "=== Full App Log ==="
        cat /tmp/app.log
        exit 1
      continue-on-error: false
    
    - name: Playwright E2E Tests (Chrome Only)
      run: |
        echo "=========================================="
        echo "MODE 3: PLAYWRIGHT E2E TESTS (Chrome Only)"
        echo "=========================================="
        echo ""
        echo "Testing in: Chrome (Chromium) Engine - parallel execution"
        echo "Speed: Optimized for CI/CD feedback - "
        echo ""
        npx playwright test --project=chromium-parallel
        echo ""
        echo "=========================================="
        echo "✅ Playwright E2E tests (Chrome Only) completed!"
        echo "=========================================="
      continue-on-error: true

    - name: Playwright E2E Tests (Multi-Browser)
      run: |
        echo "=========================================="
        echo "MODE 3: PLAYWRIGHT E2E TESTS (Multi-Browser)"
        echo "=========================================="
        echo ""
        echo "Testing in: Chrome, Firefox, Safari (Sequential)"
        echo "Speed: Comprehensive cross-browser validation"
        echo ""
        npx playwright test --project=chromium-sequential --project=firefox-sequential --project=webkit-sequential
        echo ""
        echo "=========================================="
        echo "✅ Playwright E2E tests (Multi-Browser) completed!"
        echo "=========================================="
      continue-on-error: true
    
    - name: Build Application
      run: |
        echo "=========================================="
        echo "BUILDING APPLICATION"
        echo "=========================================="
        npm run build
    
    - name: Upload Test Coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: unit-tests
        name: test-coverage
        fail_ci_if_error: false
      continue-on-error: true


