name: Complete Testing Pipeline - Jest | GitHub Actions | Playwright

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    # ============================================
    # MODE 1: JEST UNIT TESTS (5 Key Tests)
    # ============================================
    # Tests component logic in isolation
    # Simulates user interactions with mocked data
    - name: Run Jest Unit Tests
      run: npm test -- --watchAll=false --testNamePattern="TEST [1-5]:"
      env:
        CI: true
        SUPPRESS_NO_CONFIG_WARNING: true
      continue-on-error: true
    
    # ============================================
    # MODE 2: GITHUB ACTIONS ELEMENT TESTS (5 Checks)
    # ============================================
    # Tests static code structure
    # Verifies element presence and attributes
    - name: GitHub Actions Element Testing (5 Checks)
      run: |
        echo "=========================================="
        echo "MODE 2: GITHUB ACTIONS ELEMENT TESTS (5 Checks)"
        echo "=========================================="
        echo ""
        
        echo "CHECK 1️⃣  Input Elements Exist"
        grep -r '<input' src/pages/ && echo "  ✓ Input elements found" || echo "  ✗ No input elements found"
        echo ""
        
        echo "CHECK 2️⃣  Dropdown Elements Exist"
        grep -r '<select' src/pages/ && echo "  ✓ Select elements found" || echo "  ✗ No select elements found"
        echo ""
        
        echo "CHECK 3️⃣  ARIA Attributes Present"
        grep -r 'aria-required="true"' src/pages/ && echo "  ✓ aria-required found" || echo "  ✗ Missing aria-required"
        echo ""
        
        echo "CHECK 4️⃣  Form Elements Exist"
        grep -r '<form' src/pages/ && echo "  ✓ Form elements found" || echo "  ✗ No form elements found"
        echo ""
        
        echo "CHECK 5️⃣  Error Messages Have Alert Role"
        grep -r 'role="alert"' src/pages/ && echo "  ✓ Alert role found" || echo "  ✗ Missing alert role"
        echo ""
        
        echo "=========================================="
        echo "✅ GitHub Actions element testing completed!"
        echo "=========================================="
    
    # ============================================
    # MODE 3: PLAYWRIGHT E2E TESTS (5 Tests)
    # ============================================
    # Tests real browser interactions
    # Chrome (Chromium) engine only for speed
    - name: Install Playwright
      run: npm install -D @playwright/test
      continue-on-error: true
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      continue-on-error: true
    
    - name: Playwright E2E Tests (5 Tests - Chrome Only)
      run: |
        echo "=========================================="
        echo "MODE 3: PLAYWRIGHT E2E TESTS (5 Tests)"
        echo "=========================================="
        echo ""
        echo "Testing in: Chrome (Chromium) Engine"
        echo "Speed: Optimized for CI/CD feedback"
        echo ""
        npx playwright test --project=chromium
        echo ""
        echo "=========================================="
        echo "✅ Playwright E2E tests completed!"
        echo "=========================================="
      continue-on-error: true
    
    - name: Build Application
      run: |
        echo "=========================================="
        echo "BUILDING APPLICATION"
        echo "=========================================="
        npm run build
    
    - name: Upload Test Coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: unit-tests
        name: test-coverage
        fail_ci_if_error: false
      continue-on-error: true


